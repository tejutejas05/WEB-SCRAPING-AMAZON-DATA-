<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Search Portal</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:#333;
}

.search-box{
text-align:center;
margin-bottom:30px;
}

input{
padding:10px;
width:250px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.job-card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.job-title{
font-size:20px;
font-weight:bold;
}

.apply-link{
display:inline-block;
margin-top:10px;
text-decoration:none;
color:white;
background:green;
padding:6px 12px;
border-radius:4px;
}

.loading{
text-align:center;
font-size:18px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<h1>Job Search Portal 🚀</h1>

<div class="search-box">
<input type="text" id="keyword" placeholder="Search jobs (python, engineer)">
<button onclick="searchJobs()">Search</button>
</div>

<div id="loading" class="loading"></div>

<div id="jobs"></div>

</div>

<script>

async function searchJobs(){

const keyword = document.getElementById("keyword").value
const jobsDiv = document.getElementById("jobs")
const loading = document.getElementById("loading")

jobsDiv.innerHTML=""
loading.innerHTML="Loading jobs..."

try{

const response = await fetch(`http://127.0.0.1:5000/jobs?keyword=${keyword}`)
const data = await response.json()

loading.innerHTML=""

if(data.length === 0){
jobsDiv.innerHTML="<p>No jobs found</p>"
return
}

data.forEach(job => {

const jobCard = `
<div class="job-card">
<div class="job-title">${job.title}</div>
<p><b>Company:</b> ${job.company}</p>
<p><b>Location:</b> ${job.location}</p>
<a class="apply-link" href="${job.link}" target="_blank">Apply</a>
</div>
`

jobsDiv.innerHTML += jobCard

})

}catch(error){

loading.innerHTML=""
jobsDiv.innerHTML="Error loading jobs. Make sure Flask API is running."

}

}

</script>

</body>
</html>
